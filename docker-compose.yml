version: '3.9'

services:

  # ─── FASTAPI ПРИЛОЖЕНИЕ ───────────────────────────────────────
  app:
    build: .
    container_name: smartstore_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend:ro
      - ./logs:/app/logs
    networks:
      - smartstore_network

  # ─── POSTGRESQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smartstore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstore_network

  # ─── QDRANT ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: smartstore_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstore_network

  # ─── MCP СЕРВЕР ───────────────────────────────────────────────
  mcp:
    build: .
    container_name: smartstore_mcp
    restart: unless-stopped
    command: python -m app.mcp.server
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - smartstore_network

# ─── VOLUMES ──────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:

# ─── NETWORKS ─────────────────────────────────────────────────
networks:
  smartstore_network:
    driver: bridge