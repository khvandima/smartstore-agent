name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: ТЕСТЫ ───────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: naver_user
          POSTGRES_PASSWORD: naver_password
          POSTGRES_DB: naver_advisor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://naver_user:naver_password@localhost:5432/naver_advisor
          TEST_DATABASE_URL: postgresql+asyncpg://naver_user:naver_password@localhost:5432/naver_advisor_test
          SECRET_KEY: test_secret_key_for_ci_only
          GROQ_API_KEY: fake_key_for_tests
          NAVER_CLIENT_ID: fake_id
          NAVER_CLIENT_SECRET: fake_secret
          TAVILY_API_KEY: fake_key
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          QDRANT_COLLECTION_NAME: smartstore_agent
          LLM_MODEL: llama-3.3-70b-versatile
          EMBEDDING_MODEL: intfloat/multilingual-e5-large
          RERANK_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
          MCP_SERVER_URL: http://localhost:8001/sse
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ─── JOB 2: ДЕПЛОЙ (только при пуше в main) ─────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test                   # запускается только если test прошёл
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "=== Переходим в директорию проекта ==="
            cd ~/Projects/smartstore-agent

            echo "=== Получаем последние изменения ==="
            git pull origin main

            echo "=== Активируем виртуальное окружение ==="
            source .venv/bin/activate

            echo "=== Устанавливаем зависимости ==="
            pip install -r requirements.txt --quiet

            echo "=== Применяем миграции ==="
            alembic upgrade head

            echo "=== Перезапускаем приложение ==="
            # Останавливаем старый процесс если есть
            pkill -f "uvicorn app.main:app" || true
            sleep 2

            # Запускаем новый процесс в фоне
            nohup uvicorn app.main:app \
              --host 0.0.0.0 \
              --port 8000 \
              --workers 2 \
              >> ~/logs/uvicorn.log 2>&1 &

            echo "=== Деплой завершён успешно ==="

      - name: Notify on success
        if: success()
        run: echo "Деплой прошёл успешно!"

      - name: Notify on failure
        if: failure()
        run: echo "Деплой завершился с ошибкой!"